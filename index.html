<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>墨流し — Suminagashi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2e2a24;
    --ink-soft:#6f675c;
    --ink-faint:#9a9184;
    --paper:#f5f1e8;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; overflow:hidden; overscroll-behavior:none; background:var(--paper); }
  body{ font-family:'Inter',system-ui,sans-serif; animation:fadein 1.6s ease both; }
  @keyframes fadein{ from{opacity:0} to{opacity:1} }

  canvas#c{
    position:fixed; inset:0; width:100vw; height:100vh; display:block;
    touch-action:none; cursor:crosshair;
  }
  /* 細筆 fineliner — a crisp 2D pen layer ON TOP of the fluid sim */
  canvas#ink{
    position:fixed; inset:0; width:100vw; height:100vh; display:block;
    pointer-events:none;
  }

  /* ---------- title ---------- */
  .title{
    position:fixed; left:36px; top:40px;
    color:var(--ink); user-select:none; pointer-events:none;
    display:flex; flex-direction:column; align-items:flex-start; gap:22px;
  }
  .title h1{
    writing-mode:vertical-rl;
    font-family:'Zen Old Mincho',serif; font-weight:400;
    font-size:clamp(34px, 5.2vh, 46px);
    letter-spacing:0.34em; line-height:1;
    color:var(--ink);
  }
  .title .latin{
    font:300 9.5px/2.1 'Inter',sans-serif;
    letter-spacing:0.42em; text-transform:uppercase;
    color:var(--ink-soft); white-space:nowrap;
  }
  .title .latin span{ display:block; color:var(--ink-faint); letter-spacing:0.38em; }
  .title .seal{
    width:8px; height:8px; background:#a8463c; opacity:.8; margin-left:1px;
  }

  /* ---------- bottom pill ---------- */
  .pill{
    position:fixed; left:50%; bottom:28px; transform:translateX(-50%);
    display:flex; align-items:center; gap:16px;
    padding:11px 22px; border-radius:999px;
    background:rgba(250,247,240,0.62);
    backdrop-filter:blur(16px) saturate(1.05);
    -webkit-backdrop-filter:blur(16px) saturate(1.05);
    border:1px solid rgba(62,53,42,0.13);
    box-shadow:0 8px 28px rgba(52,42,28,0.10);
    user-select:none;
  }
  .swatches{ display:flex; align-items:center; gap:14px; }
  .sw{
    position:relative;
    width:28px; height:28px; border-radius:50%; border:none; cursor:pointer;
    background:var(--c); padding:0; opacity:.85;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,0.10);
    transition:transform .3s cubic-bezier(.2,.7,.3,1), box-shadow .3s, opacity .3s;
  }
  /* a generous invisible tap target (≥44px) around every swatch */
  .sw::before{ content:""; position:absolute; inset:-8px; border-radius:50%; }
  .sw:hover{ opacity:1; transform:scale(1.08); }
  .sw.sel{
    opacity:1; transform:scale(1.12);
    box-shadow:0 0 0 3px rgba(250,247,240,1), 0 0 0 4.5px var(--ink-soft);
  }
  /* white ink swatch: a pale disc (the pigment is near-white) */
  .sw.light{
    background:radial-gradient(circle at 50% 42%, #ffffff 0%, #f3efe6 62%, #e4ded2 100%);
    box-shadow:inset 0 0 0 1px rgba(62,53,42,0.18);
  }
  /* eraser swatch: a pale disc bearing a small eraser glyph */
  .sw.eraser{
    background:radial-gradient(circle at 50% 42%, #fbf8f1 0%, #efe9dd 70%, #ded6c6 100%);
    box-shadow:inset 0 0 0 1px rgba(62,53,42,0.18);
    display:grid; place-items:center; color:var(--ink-faint);
  }
  .sw.eraser svg{ width:15px; height:15px; }
  .sw.eraser:hover{ color:var(--ink-soft); }
  .sw.eraser.sel{ color:var(--ink); }
  /* per-colour edit affordance (desktop hover only) */
  .sw .edit{
    position:absolute; top:-8px; right:-8px; width:20px; height:20px; border-radius:50%;
    display:grid; place-items:center; background:var(--paper); color:var(--ink-soft);
    font-size:11px; line-height:1; border:1px solid rgba(62,53,42,0.22);
    box-shadow:0 1px 4px rgba(52,42,28,0.12);
    opacity:0; pointer-events:none; transition:opacity .25s; transform:scale(.8);
  }
  @media (hover:hover){ .sw:hover .edit{ opacity:1; pointer-events:auto; transform:scale(1); } }
  /* Native colour popups anchor over the element that opened them. A real,
     swatch-sized transparent box makes that anchor reliable — with a 1px box
     the browser would occasionally drop the picker in the top-left corner. */
  #inkPicker, #bgPicker{ position:fixed; left:0; top:0; width:28px; height:28px; opacity:0; border:0; padding:0; pointer-events:none; z-index:60; }
  /* ---- background swatches (panel) ---- */
  .bgrow{ display:flex; align-items:center; flex-wrap:wrap; gap:10px; margin:10px 0 2px; }
  .bg{
    position:relative; width:22px; height:22px; border-radius:50%; border:none; cursor:pointer;
    background:var(--b); padding:0;
    box-shadow:inset 0 0 0 1px rgba(62,53,42,0.18);
    transition:transform .25s, box-shadow .25s;
  }
  .bg::before{ content:""; position:absolute; inset:-6px; border-radius:50%; }
  .bg:hover{ transform:scale(1.1); }
  .bg.sel{ box-shadow:0 0 0 2px rgba(250,247,240,1), 0 0 0 3.5px var(--ink-soft); }
  .bg.custom{ background:conic-gradient(from 210deg, #e8722e, #f2c14e, #1fb6a6, #5cc8ee, #b07cd6, #e8722e); }
  .bg.custom .edit{
    position:absolute; inset:0; display:grid; place-items:center;
    color:#fff; font-size:11px; text-shadow:0 1px 2px rgba(0,0,0,.45);
  }
  /* even larger finger targets on touch devices */
  @media (pointer:coarse){
    .swatches{ gap:18px; }
    .sw::before{ inset:-13px; }
    .sw .edit{ width:22px; height:22px; top:-9px; right:-9px; font-size:12px; }
  }
  .pill .div{ width:1px; height:18px; background:rgba(62,53,42,0.18); }
  /* English label primary (big, on top); Japanese secondary (small, below).
     column-reverse lifts the <span> above the button's own text node. */
  .txt{
    display:flex; flex-direction:column-reverse; align-items:center; gap:1px;
    font-family:'Zen Old Mincho',serif; font-weight:400; font-size:8px;
    letter-spacing:.14em; color:var(--ink-soft);
    background:none; border:none; cursor:pointer; padding:3px 4px;
    transition:color .3s;
  }
  .txt span{
    font:400 9.5px 'Inter',sans-serif; letter-spacing:.12em;
    text-transform:uppercase; color:inherit;
  }
  .txt:hover{ color:var(--ink); }
  .modes{ display:flex; align-items:center; gap:14px; }
  .mode{
    display:flex; flex-direction:column-reverse; align-items:center; gap:1px;
    background:none; border:none; cursor:pointer; padding:2px 1px;
    font-family:'Zen Old Mincho',serif; font-size:8px; letter-spacing:.12em;
    color:var(--ink-faint); transition:color .35s;
  }
  .mode span{
    font:400 9.5px 'Inter',sans-serif; letter-spacing:.1em;
    text-transform:uppercase; color:inherit;
  }
  .mode:hover{ color:var(--ink-soft); }
  .mode.sel{ color:var(--ink); }

  /* ---------- credit ---------- */
  .credit{
    position:fixed; right:28px; bottom:32px;
    font:300 8.5px 'Inter',sans-serif; letter-spacing:0.34em;
    color:var(--ink-faint); user-select:none; pointer-events:none;
  }

  /* on a dark ground the title & credit float directly on the canvas — lift
     them to a light ink so they stay legible (pill/panel have their own ground) */
  body.darkground .title h1{ color:#ece6da; }
  body.darkground .title .latin{ color:#b8b0a1; }
  body.darkground .title .latin span{ color:#8f8676; }
  body.darkground .credit{ color:#7d7567; }

  #nogl{
    position:fixed; inset:0; display:none; place-items:center;
    color:var(--ink-soft); font:300 12px 'Inter'; letter-spacing:.2em;
  }

  /* ---------- tuning panel ---------- */
  #gearBtn{
    position:fixed; top:26px; right:26px; width:36px; height:36px;
    display:grid; place-items:center; border-radius:50%;
    background:rgba(250,247,240,0.55); color:var(--ink-soft);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(62,53,42,0.12); cursor:pointer;
    box-shadow:0 4px 16px rgba(52,42,28,0.07);
    transition:color .3s, transform .3s;
  }
  #gearBtn:hover{ color:var(--ink); }
  #gearBtn.open{ color:var(--ink); transform:rotate(90deg); }
  .panel{
    position:fixed; top:74px; right:26px; width:272px;
    padding:20px 22px 16px; border-radius:18px;
    background:rgba(250,247,240,0.72);
    backdrop-filter:blur(18px) saturate(1.05);
    -webkit-backdrop-filter:blur(18px) saturate(1.05);
    border:1px solid rgba(62,53,42,0.13);
    box-shadow:0 12px 38px rgba(52,42,28,0.13);
    opacity:0; transform:translateY(-8px); pointer-events:none;
    transition:opacity .4s ease, transform .4s ease;
    user-select:none;
  }
  .panel.open{ opacity:1; transform:none; pointer-events:auto; }
  /* English primary, Japanese a small accent before it */
  .ptitle{
    font-family:'Zen Old Mincho',serif; font-size:8px; letter-spacing:.24em;
    color:var(--ink-faint); margin-bottom:6px;
  }
  .ptitle span{
    font:400 11px 'Inter',sans-serif; letter-spacing:.16em; text-transform:uppercase;
    color:var(--ink); margin-left:9px; vertical-align:0;
  }
  .prow{ display:flex; align-items:center; gap:14px; margin:11px 0; }
  /* column-reverse → the English (.en) sits on top, the Japanese (.jp) below */
  .prow label{ width:98px; display:flex; flex-direction:column-reverse; gap:0; }
  .prow .jp{ font-family:'Zen Old Mincho',serif; font-size:7px; letter-spacing:.16em; color:var(--ink-faint); white-space:nowrap; }
  .prow .en{ font:400 9px 'Inter',sans-serif; letter-spacing:.1em; color:var(--ink-soft); white-space:nowrap; }
  .panel input[type=range]{
    -webkit-appearance:none; appearance:none; flex:1; height:16px;
    background:transparent; cursor:pointer; margin:0;
  }
  .panel input[type=range]::-webkit-slider-runnable-track{
    height:1px; background:rgba(62,53,42,0.28);
  }
  .panel input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:11px; height:11px; border-radius:50%;
    background:var(--paper); border:1px solid var(--ink-soft); margin-top:-5px;
  }
  .panel input[type=range]::-moz-range-track{
    height:1px; background:rgba(62,53,42,0.28);
  }
  .panel input[type=range]::-moz-range-thumb{
    width:9px; height:9px; border-radius:50%;
    background:var(--paper); border:1px solid var(--ink-soft);
  }
  .hair{ border:none; border-top:1px solid rgba(62,53,42,0.12); margin:15px 0 13px; }
  #textInput{
    width:100%; background:transparent; border:none; outline:none;
    border-bottom:1px solid rgba(62,53,42,0.24);
    font-family:'Zen Old Mincho',serif; font-size:13px; letter-spacing:.12em;
    color:var(--ink); padding:6px 1px; margin:2px 0 4px;
  }
  #textInput::placeholder{ color:var(--ink-faint); }
  #textInput:focus{ border-bottom-color:var(--ink-soft); }
  .phint{
    font:300 6.5px 'Inter',sans-serif; letter-spacing:.34em;
    color:var(--ink-faint); text-align:right; margin-top:4px;
  }

  @media (max-width:640px){
    .title{ left:20px; top:24px; gap:14px; }
    .title h1{ font-size:30px; }
    .title .latin{ font-size:8px; }
    .pill{
      bottom:18px; gap:10px; padding:9px 14px;
      flex-wrap:wrap; justify-content:center;
      max-width:calc(100vw - 24px); border-radius:24px;
    }
    .modes{ gap:10px; }
    .mode, .txt{ font-size:8px; }
    .mode span, .txt span{ font-size:9px; }
    .credit{ right:16px; bottom:20px; }
    #gearBtn{ top:16px; right:16px; }
    .panel{ top:62px; right:16px; width:min(272px, calc(100vw - 32px)); }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<canvas id="ink"></canvas>

<aside class="title">
  <h1>墨流し</h1>
  <div class="latin">SUMINAGASHI<span>— INK DISSOLUTION</span></div>
  <div class="seal"></div>
</aside>

<nav class="pill">
  <div class="modes">
    <button class="mode sel" data-mode="suminagashi">墨流し<span>SUMINAGASHI</span></button>
    <button class="mode" data-mode="painterly">水墨<span>PAINTERLY</span></button>
    <button class="mode" data-tool="swirl">渦<span>SWIRL</span></button>
    <button class="mode" data-tool="liner">細筆<span>FINELINER</span></button>
  </div>
  <span class="div"></span>
  <div class="swatches">
    <button class="sw sel" data-ink="black"  style="--c:#211d1a" aria-label="墨 sumi black"></button>
    <button class="sw recolor" data-ink="orange"    style="--c:#e8722e" aria-label="橙 orange"><span class="edit">✎</span></button>
    <button class="sw recolor" data-ink="sky"        style="--c:#5cc8ee" aria-label="空 sky blue"><span class="edit">✎</span></button>
    <button class="sw recolor" data-ink="turquoise"  style="--c:#1fb6a6" aria-label="碧 turquoise"><span class="edit">✎</span></button>
    <button class="sw recolor" data-ink="yellow"      style="--c:#f2c14e" aria-label="黄 yellow"><span class="edit">✎</span></button>
    <button class="sw light" data-ink="white" aria-label="白 white"></button>
    <button class="sw eraser" data-ink="eraser" aria-label="消しゴム eraser">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 18.5 L3.7 15.2 a2 2 0 0 1 0-2.8 L12 4.1 a2 2 0 0 1 2.8 0 L20.3 9.6 a2 2 0 0 1 0 2.8 L13.5 18.5 Z"/>
        <line x1="7" y1="18.5" x2="20" y2="18.5"/>
      </svg>
    </button>
  </div>
  <span class="div"></span>
  <button id="importBtn" class="txt">画像<span>IMAGE</span></button>
  <button id="saveBtn" class="txt">保存<span>SAVE</span></button>
  <button id="washBtn" class="txt">洗い流す<span>CLEAR</span></button>
</nav>
<input id="imgPicker" type="file" accept="image/*" style="position:fixed;width:1px;height:1px;opacity:0;pointer-events:none">


<div class="credit">THREE.JS&ensp;·&ensp;STABLE&nbsp;FLUIDS</div>
<div id="nogl">WEBGL UNAVAILABLE</div>

<button id="gearBtn" aria-label="調整 settings">
  <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round">
    <line x1="2" y1="4"  x2="14" y2="4"/><circle cx="10" cy="4"  r="1.7" fill="#f5f1e8"/>
    <line x1="2" y1="8"  x2="14" y2="8"/><circle cx="5.5" cy="8" r="1.7" fill="#f5f1e8"/>
    <line x1="2" y1="12" x2="14" y2="12"/><circle cx="9" cy="12" r="1.7" fill="#f5f1e8"/>
  </svg>
</button>

<aside id="panel" class="panel">
  <div class="ptitle">調整<span>TUNING</span></div>
  <div class="prow"><label><span class="jp">粘り</span><span class="en">STIFFNESS</span></label>
    <input type="range" id="sStiff" min="0" max="1" step="0.001" value="0.71"></div>
  <div class="prow"><label><span class="jp">余韻</span><span class="en">INK LIFE</span></label>
    <input type="range" id="sLife" min="0" max="1" step="0.001" value="1"></div>
  <div class="prow"><label><span class="jp">筆幅</span><span class="en">BRUSH SIZE</span></label>
    <input type="range" id="sBrush" min="0" max="1" step="0.001" value="0.23"></div>
  <div class="prow"><label><span class="jp">墨量</span><span class="en">INK AMOUNT</span></label>
    <input type="range" id="sInk" min="0" max="1" step="0.001" value="0.32"></div>
  <div class="prow"><label><span class="jp">滲み</span><span class="en">DIFFUSION</span></label>
    <input type="range" id="sDiff" min="0" max="1" step="0.001" value="0"></div>
  <div class="prow"><label><span class="jp">潤い</span><span class="en">WETNESS · 水墨</span></label>
    <input type="range" id="sWet" min="0" max="1" step="0.001" value="0.85"></div>
  <div class="prow"><label><span class="jp">粒状</span><span class="en">GRANULATION · 水墨</span></label>
    <input type="range" id="sGran" min="0" max="1" step="0.001" value="0.55"></div>
  <div class="prow"><label><span class="jp">遅延</span><span class="en">SMOOTHING · 細筆</span></label>
    <input type="range" id="sSmooth" min="0" max="1" step="0.001" value="0.5"></div>
  <hr class="hair">
  <div class="ptitle">地<span>BACKGROUND</span></div>
  <div class="bgrow" id="bgRow">
    <button class="bg sel" data-bg="#f6f2e9" style="--b:#f6f2e9" aria-label="生成 paper"></button>
    <button class="bg" data-bg="#14110d" style="--b:#14110d" aria-label="墨 black"></button>
    <button class="bg" data-bg="#f6dde4" style="--b:#f6dde4" aria-label="桜 sakura"></button>
    <button class="bg" data-bg="#dce8f0" style="--b:#dce8f0" aria-label="水 mizu"></button>
    <button class="bg" data-bg="#e4ecd9" style="--b:#e4ecd9" aria-label="若葉 wakaba"></button>
    <button class="bg" data-bg="#efe0cf" style="--b:#efe0cf" aria-label="砂 suna"></button>
    <button class="bg" data-bg="#e7e0ee" style="--b:#e7e0ee" aria-label="藤 fuji"></button>
    <button class="bg custom" id="bgCustom" aria-label="任意 custom colour"><span class="edit">✎</span></button>
  </div>
  <hr class="hair">
  <div class="ptitle">言葉<span>WRITE INK</span></div>
  <input id="textInput" type="text" maxlength="40" placeholder="言葉を墨に流す…" autocomplete="off" spellcheck="false">
  <div class="prow"><label><span class="jp">字大</span><span class="en">TEXT SIZE</span></label>
    <input type="range" id="sTSize" min="0" max="1" step="0.001" value="0.5"></div>
  <div class="prow"><label><span class="jp">筆圧</span><span class="en">TEXT WEIGHT</span></label>
    <input type="range" id="sTWeight" min="0" max="1" step="0.001" value="0.4"></div>
  <div class="phint">ENTER&nbsp;TO&nbsp;FLOW</div>
</aside>

<input id="inkPicker" type="color" aria-label="recolour swatch">
<input id="bgPicker" type="color" aria-label="background colour">

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

/* ============================================================
   Suminagashi — Jos Stam "Stable Fluids" on the GPU.
   Velocity / pressure on a coarse grid, dye (pigment optical
   density) on a fine grid; paper = light through pigment via
   Beer–Lambert, which gives subtractive colour mixing free.
   ============================================================ */

const canvas = document.getElementById('c');
let renderer;
try {
  renderer = new THREE.WebGLRenderer({
    canvas, antialias:false, depth:false, stencil:false, alpha:false,
    powerPreference:'high-performance'
  });
} catch (e) {
  document.getElementById('nogl').style.display = 'grid';
  throw e;
}
renderer.outputColorSpace = THREE.LinearSRGBColorSpace; // shaders write display-ready values
renderer.autoClear = false;

/* small / touch screens get a coarser grid and fewer iterations so the
   watercolour diffusion and the fluid solver stay fluid on a phone */
const SMALL = Math.min(innerWidth, innerHeight) < 760 ||
              matchMedia('(pointer:coarse)').matches;

const CFG = {
  SIM_RES: SMALL ? 160 : 256,   // velocity / pressure grid (short side)
  DYE_RES: SMALL ? 640 : 1024,  // pigment grid (short side)
  PRESSURE_ITER: SMALL ? 24 : 36,
  CURL: 4.0,             // gentle vorticity confinement — fine curls, not turbulence
  VEL_DISS: 1.9,         // 1/s — lively under the brush, holds shape soon after release
  DYE_DISS: 0.02,        // 1/s — pigment persists, paling very slowly
  FORCE: 3600,           // drag → velocity
  VEL_RADIUS: 0.0032,
  VEL_CAP: 600,
  BRUSH: 1,              // brush size multiplier (panel)
  INK_AMT: 1,            // dye-per-stroke multiplier (panel)
  MC_CORRECT: 0.5,       // MacCormack correction: 0.5 = crisp, 0 = soft diffusion (panel)

  /* 水墨 watercolour-on-paper model (see stepPaper / wetParams) */
  WETNESS: 0.85,         // master 水墨 wetness 0..1 (panel) — bleed, mixing, creep
  GRAN: 0.55,            // 水墨 granulation strength 0..1 (panel)
  SMOOTH: 0.5,           // 細筆 fineliner pulled-string smoothing 0..1 (panel)
  PAPER_LOAD: 3.0,       // ceiling on pigment load → washes stay translucent
  PAPER_PASSES: SMALL ? 2 : 6,   // more passes/frame → the bleed reaches its end faster
};

/* Pigments as per-channel absorption (optical density) vectors.
   The coloured inks derive their absorption from an editable hex colour
   (per-colour picker), so the palette is fully re-assignable. Sumi is its
   own dense, slightly warm preset; white is an ordinary near-zero-absorption
   pigment — it mixes subtractively like the rest and is simply (near-)invisible
   on the pale paper/water, showing mainly when laid over darker colour. */
function hexToRGB(hex){
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
  return [parseInt(hex.slice(0,2),16)/255,
          parseInt(hex.slice(2,4),16)/255,
          parseInt(hex.slice(4,6),16)/255];
}
/* reflectance → normalised absorption (Beer–Lambert). max component = 1 so
   `cap` alone governs saturation, keeping every hue bright and true. */
function absorptionFromHex(hex){
  const c = hexToRGB(hex);
  const a = c.map(v => -Math.log(Math.max(v, 0.045)));
  const m = Math.max(a[0], a[1], a[2], 1e-3);
  return [a[0]/m, a[1]/m, a[2]/m];
}
function makeColorInk(hex){
  return { kind:'color', hex, a:absorptionFromHex(hex),
    cap:1.2, strokeR:0.00090, strokeD:0.22, dropR:0.034, dropD:0.75, soft:0.60 };
}
const INKS = {
  orange   : makeColorInk('#e8722e'),   // warm orange (was crimson red)
  sky      : makeColorInk('#5cc8ee'),   // himmelblau sky blue (was indigo)
  turquoise: makeColorInk('#1fb6a6'),   // turquoise / teal (was green)
  yellow   : makeColorInk('#f2c14e'),   // warm yellow (was multicolor)
  black    : { kind:'black', a:[0.94, 1.00, 1.07], cap:4.5, strokeR:0.00030, strokeD:0.50, dropR:0.026, dropD:2.8, soft:0.16 },
  white    : { kind:'color', hex:'#ffffff', a:[0.0, 0.0, 0.0], cap:1.2, strokeR:0.00090, strokeD:0.22, dropR:0.034, dropD:0.75, soft:0.60 },
  eraser   : { kind:'eraser', a:[0.0, 0.0, 0.0], cap:1.0, strokeR:0.00160, strokeD:0.85, dropR:0.034, dropD:0.85, soft:0.50 },
};

/* ---------------- fullscreen pass plumbing ---------------- */
const ppScene = new THREE.Scene();
const ppCam   = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const quad    = new THREE.Mesh(new THREE.PlaneGeometry(2, 2));
quad.frustumCulled = false;
ppScene.add(quad);

function blit(target, mat) {
  quad.material = mat;
  renderer.setRenderTarget(target);
  renderer.render(ppScene, ppCam);
}

const VERT = /* glsl */`
  varying vec2 vUv;
  void main(){ vUv = uv; gl_Position = vec4(position, 1.0); }
`;
function makeMat(frag, uniforms) {
  return new THREE.ShaderMaterial({
    vertexShader: VERT, fragmentShader: frag, uniforms,
    depthTest:false, depthWrite:false, blending:THREE.NoBlending
  });
}

/* ---------------- shaders ---------------- */
const FRAG_ADVECT = /* glsl */`
  varying vec2 vUv;
  uniform sampler2D uVelocity;
  uniform sampler2D uSource;
  uniform vec2  uVelTexel;
  uniform float uDt;
  uniform float uDissipation;
  void main(){
    vec2 vel   = texture2D(uVelocity, vUv).xy;
    vec2 coord = vUv - uDt * vel * uVelTexel;
    gl_FragColor = uDissipation * texture2D(uSource, coord);
  }
`;

/* MacCormack correction: semi-Lagrangian advection blurs the dye a little
   every frame (bilinear averaging), which slowly greys neighbouring colours
   into each other. Advecting back and subtracting the round-trip error
   cancels that numerical diffusion; the neighbourhood clamp keeps it stable. */
const FRAG_MACCORMACK = /* glsl */`
  varying vec2 vUv;
  uniform sampler2D uPhi0;
  uniform sampler2D uPhiHat;
  uniform sampler2D uPhiBack;
  uniform sampler2D uVelocity;
  uniform vec2  uVelTexel;
  uniform vec2  uDyeTexel;
  uniform float uDt;
  uniform float uDissipation;
  uniform float uCorrect;
  void main(){
    vec4 corrected = texture2D(uPhiHat, vUv)
                   + uCorrect * (texture2D(uPhi0, vUv) - texture2D(uPhiBack, vUv));
    vec2 vel   = texture2D(uVelocity, vUv).xy;
    vec2 coord = vUv - uDt * vel * uVelTexel;
    vec2 cell  = (floor(coord / uDyeTexel - 0.5) + 0.5) * uDyeTexel;
    vec4 a = texture2D(uPhi0, cell);
    vec4 b = texture2D(uPhi0, cell + vec2(uDyeTexel.x, 0.0));
    vec4 c = texture2D(uPhi0, cell + vec2(0.0, uDyeTexel.y));
    vec4 d = texture2D(uPhi0, cell + uDyeTexel);
    corrected = clamp(corrected, min(min(a, b), min(c, d)), max(max(a, b), max(c, d)));
    gl_FragColor = uDissipation * corrected;
  }
`;

const FRAG_DIVERGENCE = /* glsl */`
  varying vec2 vUv;
  uniform sampler2D uVelocity;
  uniform vec2 uTexel;
  void main(){
    float L = texture2D(uVelocity, vUv - vec2(uTexel.x, 0.0)).x;
    float R = texture2D(uVelocity, vUv + vec2(uTexel.x, 0.0)).x;
    float B = texture2D(uVelocity, vUv - vec2(0.0, uTexel.y)).y;
    float T = texture2D(uVelocity, vUv + vec2(0.0, uTexel.y)).y;
    vec2  C = texture2D(uVelocity, vUv).xy;
    if (vUv.x - uTexel.x < 0.0) L = -C.x;
    if (vUv.x + uTexel.x > 1.0) R = -C.x;
    if (vUv.y - uTexel.y < 0.0) B = -C.y;
    if (vUv.y + uTexel.y > 1.0) T = -C.y;
    gl_FragColor = vec4(0.5 * (R - L + T - B), 0.0, 0.0, 1.0);
  }
`;

const FRAG_CURL = /* glsl */`
  varying vec2 vUv;
  uniform sampler2D uVelocity;
  uniform vec2 uTexel;
  void main(){
    float L = texture2D(uVelocity, vUv - vec2(uTexel.x, 0.0)).y;
    float R = texture2D(uVelocity, vUv + vec2(uTexel.x, 0.0)).y;
    float B = texture2D(uVelocity, vUv - vec2(0.0, uTexel.y)).x;
    float T = texture2D(uVelocity, vUv + vec2(0.0, uTexel.y)).x;
    gl_FragColor = vec4(0.5 * ((R - L) - (T - B)), 0.0, 0.0, 1.0);
  }
`;

const FRAG_VORTICITY = /* glsl */`
  varying vec2 vUv;
  uniform sampler2D uVelocity;
  uniform sampler2D uCurl;
  uniform vec2  uTexel;
  uniform float uStrength;
  uniform float uDt;
  void main(){
    float L = texture2D(uCurl, vUv - vec2(uTexel.x, 0.0)).x;
    float R = texture2D(uCurl, vUv + vec2(uTexel.x, 0.0)).x;
    float B = texture2D(uCurl, vUv - vec2(0.0, uTexel.y)).x;
    float T = texture2D(uCurl, vUv + vec2(0.0, uTexel.y)).x;
    float C = texture2D(uCurl, vUv).x;
    vec2 force = 0.5 * vec2(abs(T) - abs(B), abs(R) - abs(L));
    force /= length(force) + 0.0001;
    force *= uStrength * C;
    force.y *= -1.0;
    vec2 vel = texture2D(uVelocity, vUv).xy + force * uDt;
    gl_FragColor = vec4(clamp(vel, vec2(-1000.0), vec2(1000.0)), 0.0, 1.0);
  }
`;

const FRAG_PRESSURE = /* glsl */`
  varying vec2 vUv;
  uniform sampler2D uPressure;
  uniform sampler2D uDivergence;
  uniform vec2 uTexel;
  void main(){
    float L = texture2D(uPressure, vUv - vec2(uTexel.x, 0.0)).x;
    float R = texture2D(uPressure, vUv + vec2(uTexel.x, 0.0)).x;
    float B = texture2D(uPressure, vUv - vec2(0.0, uTexel.y)).x;
    float T = texture2D(uPressure, vUv + vec2(0.0, uTexel.y)).x;
    float div = texture2D(uDivergence, vUv).x;
    gl_FragColor = vec4((L + R + B + T - div) * 0.25, 0.0, 0.0, 1.0);
  }
`;

const FRAG_GRADIENT = /* glsl */`
  varying vec2 vUv;
  uniform sampler2D uPressure;
  uniform sampler2D uVelocity;
  uniform vec2 uTexel;
  void main(){
    float L = texture2D(uPressure, vUv - vec2(uTexel.x, 0.0)).x;
    float R = texture2D(uPressure, vUv + vec2(uTexel.x, 0.0)).x;
    float B = texture2D(uPressure, vUv - vec2(0.0, uTexel.y)).x;
    float T = texture2D(uPressure, vUv + vec2(0.0, uTexel.y)).x;
    vec2 vel = texture2D(uVelocity, vUv).xy - vec2(R - L, T - B);
    gl_FragColor = vec4(vel, 0.0, 1.0);
  }
`;

const FRAG_SPLAT = /* glsl */`
  varying vec2 vUv;
  uniform sampler2D uTarget;
  uniform float uAspect;
  uniform vec2  uPoint;
  uniform vec3  uColor;
  uniform float uRadius;
  uniform vec3  uCap;
  void main(){
    vec2 p = vUv - uPoint;
    p.x *= uAspect;
    vec3 splat = exp(-dot(p, p) / uRadius) * uColor;
    vec4 tex   = texture2D(uTarget, vUv);
    vec3 base  = tex.xyz;
    // never reduce what is already there — a light ink over dark sumi
    // saturates at its own cap instead of bleaching the sumi.
    // PRESERVE alpha: it is the 水墨 pigment load, not touched by ink-on-water.
    gl_FragColor = vec4(min(base + splat, max(base, uCap)), tex.a);
  }
`;

const FRAG_RADIAL = /* glsl */`
  varying vec2 vUv;
  uniform sampler2D uTarget;
  uniform float uAspect;
  uniform vec2  uPoint;
  uniform float uRadius;
  uniform float uStrength;
  void main(){
    vec2 p = vUv - uPoint;
    p.x *= uAspect;
    float d2  = dot(p, p);
    vec2 dir  = p / (sqrt(d2) + 1e-5);
    vec2 vel  = texture2D(uTarget, vUv).xy + dir * uStrength * exp(-d2 / uRadius);
    gl_FragColor = vec4(vel, 0.0, 1.0);
  }
`;

/* The marbling drop transform: a drop of radius r at c displaces every
   point p to c + (p-c)·√(1 + r²/|p-c|²). Inverting it and resampling the
   dye pushes existing pigment outward into a compressed band — alternating
   ink and clear dispersant drops is what draws the concentric rings. */
const FRAG_DROP = /* glsl */`
  varying vec2 vUv;
  uniform sampler2D uTarget;
  uniform float uAspect;
  uniform vec2  uPoint;
  uniform float uR;
  uniform vec3  uColor;
  uniform float uSoft;
  void main(){
    vec2 p  = (vUv - uPoint) * vec2(uAspect, 1.0);
    float d = length(p);
    if (d < uR) {
      float edge   = smoothstep(uR * (1.0 - uSoft), uR, d);
      vec3 rimCol  = texture2D(uTarget, uPoint).rgb;
      gl_FragColor = vec4(mix(uColor, rimCol, edge), 0.0);   // no 水墨 load
    } else {
      float dd = sqrt(d * d - uR * uR);
      vec2 q   = uPoint + p * (dd / d) / vec2(uAspect, 1.0);
      gl_FragColor = texture2D(uTarget, q);
    }
  }
`;

const FRAG_SCALE = /* glsl */`
  varying vec2 vUv;
  uniform sampler2D uTarget;
  uniform float uValue;
  void main(){ gl_FragColor = uValue * texture2D(uTarget, vUv); }
`;

const FRAG_DISPLAY = /* glsl */`
  varying vec2 vUv;
  uniform sampler2D uDye;
  uniform sampler2D uWhite; // opaque white pigment load (墨流し)
  uniform float uAspect;
  uniform float uMode;    // 0 = 墨流し ink-on-water, 1 = 水墨 watercolour wash
  uniform float uWetness; // 水墨 paper wetness (softens the dry-brush edges)
  uniform float uGran;    // 水墨 granulation strength (0 smooth → 1 mottled)
  uniform vec3  uPaper;   // background / paper colour (selectable)
  float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123); }
  float vnoise(vec2 p){
    vec2 i = floor(p), f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    float a = hash(i), b = hash(i + vec2(1.0, 0.0));
    float c = hash(i + vec2(0.0, 1.0)), d = hash(i + vec2(1.0, 1.0));
    return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
  }
  // fractal noise (fBm): several octaves summed — large soft variation plus
  // fine detail together, the organic multi-scale grain of paper
  float fbm(vec2 p){
    float v = 0.0, a = 0.5;
    for (int i = 0; i < 5; i++){ v += a * vnoise(p); p *= 2.02; a *= 0.5; }
    return v;
  }
  void main(){
    vec4 d4  = texture2D(uDye, vUv);
    vec3 raw = d4.rgb;
    vec2 pc  = vec2(vUv.x * uAspect, vUv.y);
    vec3 paper = uPaper;
    float mottle = vnoise(pc * 6.0) * 0.6 + vnoise(pc * 18.0) * 0.4;
    paper *= 0.994 + 0.012 * mottle;
    // EMISSIVE REVEAL: the subtractive model multiplies ink THROUGH the paper,
    // so on a dark ground everything would collapse to black. Blend in each
    // pigment's own body colour, weighted by how dark the chosen background is
    // (≈0 for paper / pastels → the classic light-ground look is untouched).
    float bgDark = smoothstep(0.0, 0.55, 1.0 - dot(uPaper, vec3(0.299, 0.587, 0.114)));
    vec3 col;

    if (uMode < 0.5) {
      // ---- 墨流し : ink on water — Beer–Lambert subtractive density ----
      vec3 density = max(raw, 0.0);
      float level = max(density.r, max(density.g, density.b));
      float gain  = pow(level, 1.45) / max(level, 1e-4);
      density = min(density * gain, vec3(6.5));
      col = paper * exp(-density);
      // pigment body colour (its reflected hue) so colour stays visible on a
      // dark ground; sumi reconstructs to a deep near-black, colours to their hue.
      float mx   = max(density.r, max(density.g, density.b));
      vec3  body = exp(-(density / max(mx, 1e-4)) * 1.7);
      col += body * (1.0 - exp(-mx)) * bgDark;
      // opaque white pigment laid over the subtractive result (its own field)
      float wCov = 1.0 - exp(-texture2D(uWhite, vUv).r * 1.3);
      col = mix(col, vec3(0.99, 0.986, 0.976), clamp(wCov, 0.0, 1.0));
    } else {
      // ---- 水墨 : flat translucent watercolour wash on paper ----
      // num = Σ(absorptionᵢ·loadᵢ), W = Σloadᵢ. The hue is the LOAD-WEIGHTED
      // AVERAGE absorption num/W, so overlapping washes mix subtractively
      // (orange+blue → muted brown) without driving toward black. Opacity comes
      // from W and is capped, so the wash stays translucent — no dense core.
      vec3 num = max(raw, 0.0);
      float W  = max(d4.a, 0.0);
      vec3 Aavg = num / max(W, 1e-4);
      vec3 tint = exp(-Aavg * 1.7);     // vivid, saturated pigment colour
      // Coverage saturates STEEPLY with load toward a translucent ceiling, so a
      // wash keeps its strength as it spreads (the plateau just covers more
      // area) — it stays vivid rather than washing out, and still never fades.
      float covBase = 0.66 * (1.0 - exp(-W * 4.6));
      // GRANULATION: a FIXED fractal paper grain (canvas space, fBm) modulating
      // pigment DENSITY — denser / thinner translucent patches, never holes.
      // uGran scales it live: 0 = perfectly smooth, up = strongly mottled.
      float g   = fbm(pc * 6.0);
      float amp = uGran * 0.95;
      float cov = covBase * (1.0 + amp * (2.0 * g - 1.0));
      // rare dry-brush ONLY where the wash is genuinely thin (rim / stroke
      // ends) — keyed off the un-mottled coverage so the body never gaps.
      float rim    = 1.0 - smoothstep(0.04, 0.34, covBase);
      float dryAmt = mix(0.50, 0.16, uWetness);
      cov *= 1.0 - dryAmt * rim * (1.0 - fbm(pc * 11.0));
      cov = clamp(cov, 0.0, 0.88);
      col = mix(paper, paper * tint, cov);
      col += tint * cov * bgDark;   // reveal the wash colour on a dark ground
    }

    vec2 q = vUv - 0.5;
    col *= 1.0 - 0.10 * dot(q, q);
    col += (hash(floor(gl_FragCoord.xy)) - 0.5) * 0.012;
    gl_FragColor = vec4(col, 1.0);
  }
`;

/* ---- white pigment (opaque, covering) ----
   White carries no subtractive absorption (it would be invisible on light
   paper), so it lives in its OWN field as an accumulating opaque load that the
   fluid advects alongside the dye. The display lays it over the subtractive
   result, so it reads as real white ink on any background — light OR dark. */
const FRAG_WHITE = /* glsl */`
  varying vec2 vUv;
  uniform sampler2D uTarget;
  uniform float uAspect;
  uniform vec2  uPoint;
  uniform float uRadius;
  uniform float uAmt;
  void main(){
    vec2 p = vUv - uPoint; p.x *= uAspect;
    float f = exp(-dot(p, p) / uRadius);
    float base = texture2D(uTarget, vUv).r;
    gl_FragColor = vec4(min(base + uAmt * f, 3.0), 0.0, 0.0, 1.0);
  }
`;

/* ---- eraser ----
   A soft brush footprint that scales any field down toward zero. On the dye it
   lifts ink-on-water density / 水墨 pigment load; on the white & wet fields it
   removes those too. The per-mode stroke logic supplies the feel: ink mode also
   lays velocity (so the cleared water flows), painterly mode does not. */
const FRAG_ERASE = /* glsl */`
  varying vec2 vUv;
  uniform sampler2D uTarget;
  uniform float uAspect;
  uniform vec2  uPoint;
  uniform float uRadius;
  uniform float uAmt;
  void main(){
    vec2 p = vUv - uPoint; p.x *= uAspect;
    float k = clamp(uAmt * exp(-dot(p, p) / uRadius), 0.0, 1.0);
    gl_FragColor = texture2D(uTarget, vUv) * (1.0 - k);
  }
`;

/* ---- image seed ----
   Pre-fills the dye/density field from a loaded photo: contain-fit centred
   (letterboxed), pixels converted to Beer–Lambert absorption so the display
   reproduces the image's colours, which the fluid solver then advects. */
const FRAG_IMAGE = /* glsl */`
  varying vec2 vUv;
  uniform sampler2D uImage;
  uniform float uCanvasAspect;
  uniform float uImageAspect;
  uniform vec3  uPaper;
  void main(){
    float dw, dh;
    if (uImageAspect > uCanvasAspect) { dw = uCanvasAspect; dh = uCanvasAspect / uImageAspect; }
    else                              { dh = 1.0; dw = uImageAspect; }
    vec2 q = vec2((vUv.x - 0.5) * uCanvasAspect, vUv.y - 0.5);
    vec2 iuv = vec2(q.x / dw + 0.5, 0.5 - q.y / dh);
    vec3 dens = vec3(0.0);
    if (iuv.x >= 0.0 && iuv.x <= 1.0 && iuv.y >= 0.0 && iuv.y <= 1.0) {
      vec3 c = clamp(texture2D(uImage, iuv).rgb, 0.004, 1.0);
      dens = max(-log(c / uPaper), 0.0);   // paper * exp(-dens) ≈ original colour
    }
    gl_FragColor = vec4(dens, 0.0);        // ink-on-water seed → no 水墨 load
  }
`;

/* paper permeability / tooth — a fixed multi-scale grain shared by the
   deposit (dry-brush gaps) and the bleed steps */
const PERM_GLSL = /* glsl */`
  float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
  float vnoise(vec2 p){
    vec2 i = floor(p), f = fract(p); f = f * f * (3.0 - 2.0 * f);
    float a = hash(i), b = hash(i + vec2(1.0, 0.0));
    float c = hash(i + vec2(0.0, 1.0)), d = hash(i + vec2(1.0, 1.0));
    return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
  }
  float perm(vec2 uv, float aspect){
    vec2 pc = vec2(uv.x * aspect, uv.y);
    float n = vnoise(pc * 18.0) * 0.62 + vnoise(pc * 60.0) * 0.38;
    return 0.3 + 0.7 * n;
  }
`;

/* ---- 水墨 watercolour-on-paper deposit ----
   The dye field carries pigment as a LOAD-WEIGHTED ABSORPTION: rgb = Σ(aᵢ·mᵢ)
   and alpha = Σmᵢ = total load W. The displayed hue is rgb/W (an average), so
   stacking or overlapping pigments mixes their HUE subtractively and never
   piles toward black — coverage comes from W and is capped, so it stays
   translucent. Wetness (which drives the bleed) lives in its own field.
   The deposit is a smooth, continuous load — the soft mottling is added at
   display time from a fixed fractal paper grain, never punched-out holes. */
const FRAG_PAPER_DEPOSIT = /* glsl */`
  varying vec2 vUv;
  uniform sampler2D uTarget;
  uniform float uAspect;
  uniform vec2  uPoint;
  uniform float uRadius;
  uniform vec3  uAbsorb;   // unit absorption (hue) of the pigment
  uniform float uAmt;      // pigment load laid down at the brush centre
  uniform float uLoadCap;  // ceiling on accumulated load → washes stay see-through
  void main(){
    vec2 p = vUv - uPoint; p.x *= uAspect;
    float f = exp(-dot(p, p) / uRadius);
    vec4 base = texture2D(uTarget, vUv);
    float dm  = uAmt * f;
    vec3  num = base.rgb + uAbsorb * dm;
    float W   = base.a   + dm;
    if (W > uLoadCap) { float s = uLoadCap / W; num *= s; W = uLoadCap; } // hold the hue, cap the load
    gl_FragColor = vec4(num, W);
  }
`;

/* lays down paper wetness (its own field) where the brush touches */
const FRAG_PAPER_WET = /* glsl */`
  varying vec2 vUv;
  uniform sampler2D uTarget;
  uniform float uAspect;
  uniform vec2  uPoint;
  uniform float uRadius;
  uniform float uWet;
  void main(){
    vec2 p = vUv - uPoint; p.x *= uAspect;
    float f = exp(-dot(p, p) / uRadius);
    float base = texture2D(uTarget, vUv).r;
    gl_FragColor = vec4(max(base, clamp(uWet * f, 0.0, 1.45)), 0.0, 0.0, 1.0);
  }
`;

/* ---- 水墨 capillary bleed ----
   Conservative diffusion of pigment (numerator AND load together, so the hue
   is preserved while it spreads), weighted by wetness × paper permeability.
   Pigment is conserved — nothing decays. */
const FRAG_PAPER_DIFFUSE = /* glsl */`
  varying vec2 vUv;
  uniform sampler2D uDye;
  uniform sampler2D uWet;
  uniform vec2  uTexel;
  uniform float uAspect;
  uniform float uRate;
  uniform float uMix;
  ${PERM_GLSL}
  float mob(vec2 uv){ return texture2D(uWet, uv).r * perm(uv, uAspect); }
  vec4 flux(vec4 c, float mHere, vec2 nUv){
    vec4 cn = texture2D(uDye, nUv);
    // extra blending where two PIGMENTED cells of different HUE meet → wet
    // washes run into each other strongly at their contact zones. Gated by
    // 'both' so a colour bleeding into blank paper still spreads at the base
    // rate (each colour keeps itself; only real overlaps mix harder).
    vec3 hc = c.rgb  / max(c.a,  1e-3);
    vec3 hn = cn.rgb / max(cn.a, 1e-3);
    float both = smoothstep(0.04, 0.28, min(c.a, cn.a));
    float hueDiff = length(hn - hc) * both;
    float k = min(uRate * 0.5 * (mHere + mob(nUv)) * (1.0 + uMix * hueDiff), 0.25);
    return k * (cn - c);
  }
  void main(){
    vec4 c = texture2D(uDye, vUv);
    float mHere = mob(vUv);
    vec4 s = flux(c, mHere, vUv - vec2(uTexel.x, 0.0))
           + flux(c, mHere, vUv + vec2(uTexel.x, 0.0))
           + flux(c, mHere, vUv - vec2(0.0, uTexel.y))
           + flux(c, mHere, vUv + vec2(0.0, uTexel.y));
    gl_FragColor = c + s;
  }
`;

/* the wet front creeps a little, then dries — so the bleed runs out and settles */
const FRAG_PAPER_WET_DIFFUSE = /* glsl */`
  varying vec2 vUv;
  uniform sampler2D uWet;
  uniform vec2  uTexel;
  uniform float uAspect;
  uniform float uRate;
  uniform float uDry;
  ${PERM_GLSL}
  float mob(vec2 uv){ return texture2D(uWet, uv).r * perm(uv, uAspect); }
  float flux(float c, float mHere, vec2 nUv){
    float cn = texture2D(uWet, nUv).r;
    float k = min(uRate * 0.5 * (mHere + mob(nUv)), 0.22);
    return k * (cn - c);
  }
  void main(){
    float c = texture2D(uWet, vUv).r;
    float mHere = mob(vUv);
    float s = flux(c, mHere, vUv - vec2(uTexel.x, 0.0))
            + flux(c, mHere, vUv + vec2(uTexel.x, 0.0))
            + flux(c, mHere, vUv - vec2(0.0, uTexel.y))
            + flux(c, mHere, vUv + vec2(0.0, uTexel.y));
    gl_FragColor = vec4(clamp((c + s) * uDry, 0.0, 1.45), 0.0, 0.0, 1.0);
  }
`;

/* ---------------- materials ---------------- */
const v2 = () => new THREE.Vector2();
const v3 = () => new THREE.Vector3();

const matAdvect = makeMat(FRAG_ADVECT, {
  uVelocity:{value:null}, uSource:{value:null}, uVelTexel:{value:v2()},
  uDt:{value:0}, uDissipation:{value:1},
});
const matMacCormack = makeMat(FRAG_MACCORMACK, {
  uPhi0:{value:null}, uPhiHat:{value:null}, uPhiBack:{value:null},
  uVelocity:{value:null}, uVelTexel:{value:v2()}, uDyeTexel:{value:v2()},
  uDt:{value:0}, uDissipation:{value:1}, uCorrect:{value:0.5},
});
const matDivergence = makeMat(FRAG_DIVERGENCE, { uVelocity:{value:null}, uTexel:{value:v2()} });
const matCurl       = makeMat(FRAG_CURL,       { uVelocity:{value:null}, uTexel:{value:v2()} });
const matVorticity  = makeMat(FRAG_VORTICITY, {
  uVelocity:{value:null}, uCurl:{value:null}, uTexel:{value:v2()},
  uStrength:{value:CFG.CURL}, uDt:{value:0},
});
const matPressure = makeMat(FRAG_PRESSURE, { uPressure:{value:null}, uDivergence:{value:null}, uTexel:{value:v2()} });
const matGradient = makeMat(FRAG_GRADIENT, { uPressure:{value:null}, uVelocity:{value:null}, uTexel:{value:v2()} });
const matSplat = makeMat(FRAG_SPLAT, {
  uTarget:{value:null}, uAspect:{value:1}, uPoint:{value:v2()},
  uColor:{value:v3()}, uRadius:{value:0.001}, uCap:{value:v3()},
});
const matRadial = makeMat(FRAG_RADIAL, {
  uTarget:{value:null}, uAspect:{value:1}, uPoint:{value:v2()},
  uRadius:{value:0.001}, uStrength:{value:0},
});
const matDrop = makeMat(FRAG_DROP, {
  uTarget:{value:null}, uAspect:{value:1}, uPoint:{value:v2()},
  uR:{value:0.04}, uColor:{value:v3()}, uSoft:{value:0.2},
});
const matScale   = makeMat(FRAG_SCALE,   { uTarget:{value:null}, uValue:{value:1} });
const matDisplay = makeMat(FRAG_DISPLAY, { uDye:{value:null}, uWhite:{value:null}, uAspect:{value:1}, uMode:{value:0}, uWetness:{value:0.85}, uGran:{value:0.55}, uPaper:{value:new THREE.Vector3(0.964, 0.951, 0.915)} });
const matWhite = makeMat(FRAG_WHITE, {
  uTarget:{value:null}, uAspect:{value:1}, uPoint:{value:v2()}, uRadius:{value:0.001}, uAmt:{value:0.6},
});
const matErase = makeMat(FRAG_ERASE, {
  uTarget:{value:null}, uAspect:{value:1}, uPoint:{value:v2()}, uRadius:{value:0.001}, uAmt:{value:0.6},
});
const matImage = makeMat(FRAG_IMAGE, {
  uImage:{value:null}, uCanvasAspect:{value:1}, uImageAspect:{value:1}, uPaper:{value:v3()},
});
const matPaperDeposit = makeMat(FRAG_PAPER_DEPOSIT, {
  uTarget:{value:null}, uAspect:{value:1}, uPoint:{value:v2()},
  uRadius:{value:0.001}, uAbsorb:{value:v3()}, uAmt:{value:0.2}, uLoadCap:{value:3},
});
const matPaperWet = makeMat(FRAG_PAPER_WET, {
  uTarget:{value:null}, uAspect:{value:1}, uPoint:{value:v2()},
  uRadius:{value:0.001}, uWet:{value:1},
});
const matPaperDiffuse = makeMat(FRAG_PAPER_DIFFUSE, {
  uDye:{value:null}, uWet:{value:null}, uTexel:{value:v2()}, uAspect:{value:1}, uRate:{value:0.1}, uMix:{value:0},
});
const matPaperWetDiffuse = makeMat(FRAG_PAPER_WET_DIFFUSE, {
  uWet:{value:null}, uTexel:{value:v2()}, uAspect:{value:1}, uRate:{value:0.1}, uDry:{value:0.985},
});

/* ---------------- render targets ---------------- */
let W = 0, H = 0;
let velocity, dye, whiteFld, wet, pressure, divergenceRT, curlRT, dyeHatRT, dyeBackRT;

function makeRT(w, h) {
  const rt = new THREE.WebGLRenderTarget(w, h, {
    type: THREE.HalfFloatType, format: THREE.RGBAFormat,
    minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
    wrapS: THREE.ClampToEdgeWrapping, wrapT: THREE.ClampToEdgeWrapping,
    depthBuffer: false,
  });
  rt.texture.generateMipmaps = false;
  return rt;
}
function makeDouble(w, h) {
  return {
    texel: new THREE.Vector2(1 / w, 1 / h),
    read: makeRT(w, h), write: makeRT(w, h),
    swap(){ const t = this.read; this.read = this.write; this.write = t; },
    dispose(){ this.read.dispose(); this.write.dispose(); },
  };
}
function gridSize(base) {
  const aspect = W / H;
  let w, h;
  if (aspect >= 1) { h = base; w = Math.round(base * aspect); }
  else             { w = base; h = Math.round(base / aspect); }
  return [Math.min(w, 2048), Math.min(h, 2048)];
}

function viewSize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = Math.max(1, Math.floor(innerWidth  * dpr));
  H = Math.max(1, Math.floor(innerHeight * dpr));
  renderer.setSize(W, H, false);
}

function initFBOs(keepInk) {
  const [sw, sh] = gridSize(CFG.SIM_RES);
  const [dw, dh] = gridSize(CFG.DYE_RES);
  const nVel = makeDouble(sw, sh);
  const nDye = makeDouble(dw, dh);
  const nWht = makeDouble(dw, dh);
  const nWet = makeDouble(dw, dh);
  const nPre = makeDouble(sw, sh);
  const nDiv = makeRT(sw, sh);
  const nCur = makeRT(sw, sh);
  const nHat = makeRT(dw, dh);
  const nBak = makeRT(dw, dh);
  if (keepInk && dye) {
    matScale.uniforms.uValue.value = 1;
    matScale.uniforms.uTarget.value = dye.read.texture;      blit(nDye.read, matScale);
    matScale.uniforms.uTarget.value = whiteFld.read.texture; blit(nWht.read, matScale);
    matScale.uniforms.uTarget.value = velocity.read.texture; blit(nVel.read, matScale);
  }
  if (dye) {
    velocity.dispose(); dye.dispose(); whiteFld.dispose(); wet.dispose(); pressure.dispose();
    divergenceRT.dispose(); curlRT.dispose();
    dyeHatRT.dispose(); dyeBackRT.dispose();
  }
  velocity = nVel; dye = nDye; whiteFld = nWht; wet = nWet; pressure = nPre;
  divergenceRT = nDiv; curlRT = nCur;
  dyeHatRT = nHat; dyeBackRT = nBak;
}

/* ---------------- splat helpers ---------------- */
function applySplat(fbo, x, y, radius, color, cap) {
  const u = matSplat.uniforms;
  u.uTarget.value = fbo.read.texture;
  u.uAspect.value = W / H;
  u.uPoint.value.set(x, y);
  u.uRadius.value = radius;
  u.uColor.value.set(color[0], color[1], color[2]);
  u.uCap.value.setScalar(cap);
  blit(fbo.write, matSplat);
  fbo.swap();
}
function dyeSplat(x, y, ink, radius, amount) {
  applySplat(dye, x, y, radius,
    [ink.a[0] * amount, ink.a[1] * amount, ink.a[2] * amount], ink.cap);
}
/* opaque white pigment: accumulate load into the dedicated white field */
function whiteCover(x, y, radius, amount) {
  const u = matWhite.uniforms;
  u.uTarget.value = whiteFld.read.texture;
  u.uAspect.value = W / H;
  u.uPoint.value.set(x, y);
  u.uRadius.value = radius;
  u.uAmt.value = amount * 0.6;
  blit(whiteFld.write, matWhite);
  whiteFld.swap();
}
/* eraser: scale a field down toward zero inside a soft brush footprint */
function eraseField(fbo, x, y, radius, amount) {
  const u = matErase.uniforms;
  u.uTarget.value = fbo.read.texture;
  u.uAspect.value = W / H;
  u.uPoint.value.set(x, y);
  u.uRadius.value = radius;
  u.uAmt.value = amount;
  blit(fbo.write, matErase);
  fbo.swap();
}
function eraseDab(x, y, radius, amount) {
  eraseField(dye, x, y, radius, amount);       // ink density / 水墨 pigment load
  eraseField(whiteFld, x, y, radius, amount);  // opaque white pigment
  eraseField(wet, x, y, radius, amount);       // dry the spot so colour can't re-bleed in
}
function velSplat(x, y, vx, vy, radius = CFG.VEL_RADIUS) {
  applySplat(velocity, x, y, radius, [vx, vy, 0], CFG.VEL_CAP);
}
/* ink = null drops clear dispersant, pushing pigment out into a ring */
function inkDrop(x, y, ink, r, amount, soft) {
  const u = matDrop.uniforms;
  u.uTarget.value = dye.read.texture;
  u.uAspect.value = W / H;
  u.uPoint.value.set(x, y);
  u.uR.value = r;
  u.uSoft.value = soft;
  if (ink) {
    u.uColor.value.set(
      Math.min(ink.a[0] * amount, ink.cap),
      Math.min(ink.a[1] * amount, ink.cap),
      Math.min(ink.a[2] * amount, ink.cap));
  } else {
    u.uColor.value.set(0, 0, 0);
  }
  blit(dye.write, matDrop);
  dye.swap();
}
function radialPush(x, y, radius, strength) {
  const u = matRadial.uniforms;
  u.uTarget.value = velocity.read.texture;
  u.uAspect.value = W / H;
  u.uPoint.value.set(x, y);
  u.uRadius.value = radius;
  u.uStrength.value = strength;
  blit(velocity.write, matRadial);
  velocity.swap();
}
function scalePass(fbo, value) {
  matScale.uniforms.uValue.value = value;
  matScale.uniforms.uTarget.value = fbo.read.texture;
  blit(fbo.write, matScale);
  fbo.swap();
}

/* the master wetness slider scales every wet behaviour together */
function wetParams() {
  const w = CFG.WETNESS;
  return {
    w,
    depWet: 0.5 + 1.1 * w,          // wetness laid per dab
    dry:    0.90 + 0.085 * w,       // per-frame drying: the bleed runs out & settles in ~1-2s
    rate:   0.07 + 0.16 * w,        // capillary bleed speed — strong spread when wet
    tongue: 0.004 + 0.075 * w,      // directional creep length at start / end (uv)
  };
}

/* lay wetness only (no pigment) — used for the directional start/end creep */
function wetDab(x, y, radius, wetAmt) {
  const u = matPaperWet.uniforms;
  u.uTarget.value = wet.read.texture;
  u.uAspect.value = W / H;
  u.uPoint.value.set(x, y);
  u.uRadius.value = radius;
  u.uWet.value = wetAmt;
  blit(wet.write, matPaperWet);
  wet.swap();
}

/* 水墨 paper deposit: pigment load into the dye field, wetness into its own
   field, no velocity — the mark stays where the brush put it. */
function paperDeposit(x, y, ink, radius, amount) {
  const wp = wetParams();
  const u = matPaperDeposit.uniforms;
  u.uTarget.value = dye.read.texture;
  u.uAspect.value = W / H;
  u.uPoint.value.set(x, y);
  u.uRadius.value = radius;
  u.uAbsorb.value.set(ink.a[0], ink.a[1], ink.a[2]);
  u.uAmt.value = amount;
  u.uLoadCap.value = CFG.PAPER_LOAD;
  blit(dye.write, matPaperDeposit);
  dye.swap();

  wetDab(x, y, radius, wp.depWet);
}

/* a wet tongue creeping in the stroke direction — existing pigment then wicks
   into it over the next second, so colour bleeds forward/back, then settles */
function wetTongue(x, y, dx, dy, radius) {
  const wp = wetParams();
  const len = wp.tongue;
  if (len < 1e-4) return;
  const n = 4;
  for (let i = 1; i <= n; i++) {
    const t = i / n;
    wetDab(x + dx * len * t, y + dy * len * t, radius * (1.0 - 0.35 * t), wp.depWet * (1.0 - 0.45 * t));
  }
}

/* dry the sheet (clear wetness) — pigment is untouched and permanent */
function dryPaper() {
  if (wet) scalePass(wet, 0);
}

/* ---------------- simulation step ---------------- */
function step(dt) {
  const tex = velocity.texel;

  matCurl.uniforms.uVelocity.value = velocity.read.texture;
  matCurl.uniforms.uTexel.value.copy(tex);
  blit(curlRT, matCurl);

  const uv = matVorticity.uniforms;
  uv.uVelocity.value = velocity.read.texture;
  uv.uCurl.value = curlRT.texture;
  uv.uTexel.value.copy(tex);
  uv.uDt.value = dt;
  blit(velocity.write, matVorticity);
  velocity.swap();

  matDivergence.uniforms.uVelocity.value = velocity.read.texture;
  matDivergence.uniforms.uTexel.value.copy(tex);
  blit(divergenceRT, matDivergence);

  scalePass(pressure, 0.8);
  matPressure.uniforms.uDivergence.value = divergenceRT.texture;
  matPressure.uniforms.uTexel.value.copy(tex);
  for (let i = 0; i < CFG.PRESSURE_ITER; i++) {
    matPressure.uniforms.uPressure.value = pressure.read.texture;
    blit(pressure.write, matPressure);
    pressure.swap();
  }

  matGradient.uniforms.uPressure.value = pressure.read.texture;
  matGradient.uniforms.uVelocity.value = velocity.read.texture;
  matGradient.uniforms.uTexel.value.copy(tex);
  blit(velocity.write, matGradient);
  velocity.swap();

  const ua = matAdvect.uniforms;
  ua.uVelTexel.value.copy(tex);
  ua.uDt.value = dt;
  ua.uVelocity.value = velocity.read.texture;
  ua.uSource.value = velocity.read.texture;
  ua.uDissipation.value = Math.exp(-CFG.VEL_DISS * dt);
  blit(velocity.write, matAdvect);
  velocity.swap();

  // dye: MacCormack — forward, backward, then corrected write
  ua.uVelocity.value = velocity.read.texture;
  ua.uSource.value = dye.read.texture;
  ua.uDissipation.value = 1;
  blit(dyeHatRT, matAdvect);

  ua.uSource.value = dyeHatRT.texture;
  ua.uDt.value = -dt;
  blit(dyeBackRT, matAdvect);

  const um = matMacCormack.uniforms;
  um.uPhi0.value = dye.read.texture;
  um.uPhiHat.value = dyeHatRT.texture;
  um.uPhiBack.value = dyeBackRT.texture;
  um.uVelocity.value = velocity.read.texture;
  um.uVelTexel.value.copy(tex);
  um.uDyeTexel.value.copy(dye.texel);
  um.uDt.value = dt;
  um.uDissipation.value = Math.exp(-CFG.DYE_DISS * dt);
  um.uCorrect.value = CFG.MC_CORRECT;
  blit(dye.write, matMacCormack);
  dye.swap();

  // white pigment: a plain semi-Lagrangian advection (soft is fine for white),
  // riding the same velocity and fading with the same ink-life dissipation
  ua.uVelocity.value = velocity.read.texture;
  ua.uSource.value = whiteFld.read.texture;
  ua.uDt.value = dt;
  ua.uDissipation.value = Math.exp(-CFG.DYE_DISS * dt);
  blit(whiteFld.write, matAdvect);
  whiteFld.swap();
}

/* 水墨 watercolour-on-paper: no advection, just capillary bleed weighted by
   wetness. Pigment (hue + load) is conserved as it spreads; only the wetness
   decays, so the bleed creeps a short way and then settles. */
function stepPaper(dt) {
  const passes = CFG.PAPER_PASSES;
  const aspect = W / H;
  const wp = wetParams();
  const dryPerPass = Math.pow(wp.dry, (dt * 60) / passes);
  for (let i = 0; i < passes; i++) {
    let u = matPaperDiffuse.uniforms;
    u.uDye.value = dye.read.texture;
    u.uWet.value = wet.read.texture;
    u.uTexel.value.copy(dye.texel);
    u.uAspect.value = aspect;
    u.uRate.value = wp.rate;
    u.uMix.value = 4.0 + 5.0 * wp.w;   // wetter → stronger mixing at colour contacts
    blit(dye.write, matPaperDiffuse);
    dye.swap();

    u = matPaperWetDiffuse.uniforms;
    u.uWet.value = wet.read.texture;
    u.uTexel.value.copy(wet.texel);
    u.uAspect.value = aspect;
    u.uRate.value = wp.rate;
    u.uDry.value = dryPerPass;
    blit(wet.write, matPaperWetDiffuse);
    wet.swap();
  }
}

function render() {
  matDisplay.uniforms.uDye.value = dye.read.texture;
  matDisplay.uniforms.uWhite.value = whiteFld.read.texture;
  matDisplay.uniforms.uAspect.value = W / H;
  matDisplay.uniforms.uMode.value = (mode === 'painterly') ? 1 : 0;
  matDisplay.uniforms.uWetness.value = CFG.WETNESS;
  matDisplay.uniforms.uGran.value = CFG.GRAN;
  blit(null, matDisplay);
}

/* ---------------- interaction ---------------- */
const nowS = () => performance.now() / 1000;
let strokeInk = INKS.black;
let mode = 'suminagashi';   // 'suminagashi' (ink on water) | 'painterly' (water-colour on paper)
let tool = 'brush';         // 'brush' (fluid/pigment) | 'liner' (細筆 pen overlay)

function pickInk() {
  return INKS[selected] || INKS.black;
}

/* one brush dab — routed to the right surface model */
function brushDab(x, y, ink, radius, amount) {
  if (ink.kind === 'eraser') eraseDab(x, y, radius, amount);       // both modes
  else if (mode === 'painterly') paperDeposit(x, y, ink, radius, amount);
  else if (ink === INKS.white) whiteCover(x, y, radius, amount);  // ink mode: covering white
  else dyeSplat(x, y, ink, radius, amount);
}

/* ================= 細筆 FINELINER ==================================
   A crisp pen layer on a separate 2D canvas, ON TOP of the fluid sim — it
   does not touch the solver, never bleeds, and stays exactly where drawn.
   Streamline smoothing makes it fluid; a slow 1D fBm offset perpendicular
   to the path gives a gentle hand-drawn waver (not shaky jitter).        */
const inkCanvas = document.getElementById('ink');
const inkCtx = inkCanvas.getContext('2d');

function lhash(n){ const s = Math.sin(n * 12.9898) * 43758.5453; return s - Math.floor(s); }
function lnoise(x){ const i = Math.floor(x), f = x - i; const u = f * f * (3 - 2 * f); return lhash(i) * (1 - u) + lhash(i + 1) * u; }
function fbm1(x){ return 0.62 * lnoise(x) + 0.38 * lnoise(x * 2.3 + 5.2); }   // gentle, low-freq

function linerColor(){
  const ink = INKS[selected];
  if (ink && ink.hex) return ink.hex;          // a coloured ink (incl. white) → its hue, opaque
  return '#211d1a';                            // 墨 sumi
}

const liner = { drawing:false, id:-1, dpr:1, w:2, lazyR:30, catch:0.6, sx:0, sy:0, pwx:0, pwy:0, mx:0, my:0, arc:0, seed:0 };

function linerPx(e){
  const r = inkCanvas.getBoundingClientRect();
  return [(e.clientX - r.left) * inkCanvas.width / r.width,
          (e.clientY - r.top)  * inkCanvas.height / r.height];
}
function linerDown(e){
  if (liner.drawing) return;                   // one line at a time
  const [x, y] = linerPx(e);
  liner.drawing = true; liner.id = e.pointerId;
  liner.dpr = inkCanvas.width / Math.max(1, innerWidth);
  liner.w = (0.8 + CFG.BRUSH * 1.8) * liner.dpr;   // thickness ← BRUSH SIZE slider
  liner.lazyR = (4 + CFG.SMOOTH * 80) * liner.dpr; // pulled-string length ← SMOOTHING slider
  liner.catch = 0.85 - CFG.SMOOTH * 0.55;          // catch-up easing (lower = laggier trail)
  liner.sx = x; liner.sy = y; liner.pwx = x; liner.pwy = y; liner.mx = x; liner.my = y;
  liner.arc = 0; liner.seed = Math.random() * 1000;
  // eraser selected → rub OUT existing pen strokes; otherwise draw normally
  inkCtx.globalCompositeOperation = (selected === 'eraser') ? 'destination-out' : 'source-over';
  if (selected === 'eraser') liner.w *= 2.0;   // a wider rub for the eraser
  inkCtx.strokeStyle = inkCtx.fillStyle = (selected === 'eraser') ? '#000' : linerColor();
  inkCtx.lineWidth = liner.w; inkCtx.lineCap = 'round'; inkCtx.lineJoin = 'round';
  inkCtx.beginPath(); inkCtx.arc(x, y, liner.w * 0.5, 0, 6.28319); inkCtx.fill();   // touchdown dot
}
function linerStep(rawx, rawy){
  // pulled-string ("lazy mouse"): the drawn point trails the pointer, held
  // ~lazyR behind it, then eased in — quick moves become soft trailing curves
  // and corners round off naturally.
  const gx = rawx - liner.sx, gy = rawy - liner.sy;
  const gd = Math.hypot(gx, gy);
  let tx = liner.sx, ty = liner.sy;
  if (gd > liner.lazyR) { const k = (gd - liner.lazyR) / gd; tx = liner.sx + gx * k; ty = liner.sy + gy * k; }
  const nsx = liner.sx + (tx - liner.sx) * liner.catch;
  const nsy = liner.sy + (ty - liner.sy) * liner.catch;
  const dx = nsx - liner.sx, dy = nsy - liner.sy;
  const d = Math.hypot(dx, dy);
  if (d < 0.35) { liner.sx = nsx; liner.sy = nsy; return; }
  liner.arc += d;
  const nx = -dy / d, ny = dx / d;             // unit perpendicular to the path
  const ph = liner.arc / liner.dpr;
  // TWO scales of waver: a slow gentle wander + a fine high-frequency tremor
  const slow  = (fbm1(ph * 0.008 + liner.seed) - 0.5) * 2.0 * (2.0 + CFG.BRUSH * 0.6) * liner.dpr;
  const micro = (lnoise(ph * 0.075 + liner.seed * 1.7) - 0.5) * 2.0 * (0.6 + CFG.BRUSH * 0.2) * liner.dpr;
  const off = slow + micro;
  const wx = nsx + nx * off, wy = nsy + ny * off;
  const mx = (liner.pwx + wx) * 0.5, my = (liner.pwy + wy) * 0.5;
  inkCtx.beginPath();                          // smooth incremental quadratic through midpoints
  inkCtx.moveTo(liner.mx, liner.my);
  inkCtx.quadraticCurveTo(liner.pwx, liner.pwy, mx, my);
  inkCtx.stroke();
  liner.sx = nsx; liner.sy = nsy; liner.pwx = wx; liner.pwy = wy; liner.mx = mx; liner.my = my;
}
function linerMove(e){
  const evs = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
  for (const ev of evs){ const [x, y] = linerPx(ev); linerStep(x, y); }
}
function linerUp(e){
  if (!liner.drawing || e.pointerId !== liner.id) return;
  inkCtx.beginPath(); inkCtx.moveTo(liner.mx, liner.my); inkCtx.lineTo(liner.pwx, liner.pwy); inkCtx.stroke();
  inkCtx.globalCompositeOperation = 'source-over';   // restore for drawImage on resize
  liner.drawing = false; liner.id = -1;
}
/* size the pen layer to match the WebGL canvas, preserving existing line work */
function sizeInk(preserve){
  let tmp = null;
  if (preserve && inkCanvas.width){
    tmp = document.createElement('canvas');
    tmp.width = inkCanvas.width; tmp.height = inkCanvas.height;
    tmp.getContext('2d').drawImage(inkCanvas, 0, 0);
  }
  inkCanvas.width = W; inkCanvas.height = H;
  if (tmp) inkCtx.drawImage(tmp, 0, 0, tmp.width, tmp.height, 0, 0, W, H);
}
function clearInk(){ inkCtx.clearRect(0, 0, inkCanvas.width, inkCanvas.height); }

const pointers = new Map();
function uvFromEvent(e) {
  const r = canvas.getBoundingClientRect();
  return [(e.clientX - r.left) / r.width, 1 - (e.clientY - r.top) / r.height];
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);
  if (tool === 'liner') { linerDown(e); return; }
  const [x, y] = uvFromEvent(e);
  strokeInk = pickInk();
  pointers.set(e.pointerId, { x, y, dist:0, dirx:0, diry:0, lastR:0, started:false });
  if (tool === 'swirl') return;          // swirl adds no dye — just track for velocity
  const b2 = CFG.BRUSH * CFG.BRUSH;
  // 水墨: the brush enters small (a fine point), as a Japanese brush does
  const r0 = mode === 'painterly' ? strokeInk.strokeR * 0.9 * b2 : strokeInk.strokeR * 2.2 * b2;
  const amt0 = strokeInk.strokeD * (mode === 'painterly' ? 1.25 : 0.8) * CFG.INK_AMT;
  brushDab(x, y, strokeInk, r0, amt0);
});

canvas.addEventListener('pointermove', e => {
  if (tool === 'liner') {
    if (liner.drawing && e.pointerId === liner.id) { e.preventDefault(); linerMove(e); }
    return;
  }
  const p = pointers.get(e.pointerId);
  if (!p) return;
  e.preventDefault();
  const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
  for (const ev of events) {
    const [x, y] = uvFromEvent(ev);
    const dx = x - p.x, dy = y - p.y;
    const len = Math.hypot(dx, dy);
    if (len < 1e-5) continue;
    p.dist += len;
    const b2 = CFG.BRUSH * CFG.BRUSH;
    if (tool === 'swirl') {
      // pure velocity — pushes / curls existing ink & images, adds no colour.
      // Strength follows INK AMOUNT, footprint follows BRUSH SIZE.
      const strength = CFG.FORCE * (0.6 + 0.7 * CFG.INK_AMT);
      velSplat(x, y, dx * strength, dy * strength, CFG.VEL_RADIUS * b2);
      p.x = x; p.y = y;
      continue;
    }
    if (mode === 'painterly') {
      // water-colour on paper: deposit pigment along the path, no velocity —
      // the mark stays where it is painted and only bleeds a short way.
      // The brush swells slowly from a fine point toward a capped maximum as
      // the stroke runs on (筆 pressure) — gentle, never ballooning.
      const grow = 1.0 - 0.55 * Math.exp(-p.dist / 0.8);   // 0.45 → 1.0, slow
      const r = strokeInk.strokeR * 1.15 * b2 * grow;
      const invLen = 1.0 / len;
      if (!p.started) {
        // a slight wet creep BACK from the touchdown, along the stroke axis
        // (skipped for the eraser — it should dry, not wet, the sheet)
        p.started = true;
        if (strokeInk.kind !== 'eraser') wetTongue(p.x, p.y, -dx * invLen, -dy * invLen, r * 2.0);
      }
      p.dirx = dx * invLen; p.diry = dy * invLen; p.lastR = r;
      const steps = Math.max(1, Math.ceil(len / 0.004));
      for (let i = 1; i <= steps; i++) {
        const t = i / steps;
        brushDab(p.x + dx * t, p.y + dy * t, strokeInk,
          r, strokeInk.strokeD * 1.35 * CFG.INK_AMT);
      }
    } else {
      velSplat(x, y, dx * CFG.FORCE, dy * CFG.FORCE, CFG.VEL_RADIUS * b2);
      // fast strokes lay down thinner ink — the brush skips over the water
      const thin = THREE.MathUtils.clamp(1.05 - len * 28, 0.15, 1.0);
      const steps = Math.max(1, Math.ceil(len / 0.004));
      for (let i = 1; i <= steps; i++) {
        const t = i / steps;
        brushDab(p.x + dx * t, p.y + dy * t, strokeInk,
          strokeInk.strokeR * b2, strokeInk.strokeD * thin * CFG.INK_AMT);
      }
    }
    p.x = x; p.y = y;
  }
});

/* Repeated taps on one spot alternate ink and clear dispersant —
   the traditional gesture, so tapping in place draws concentric rings. */
const lastTap = { x:-1, y:-1, t:-10, n:0 };
function dropAlternate(x, y) {
  const t = nowS();
  const near = Math.hypot(x - lastTap.x, y - lastTap.y) < 0.12 && t - lastTap.t < 5;
  lastTap.n = near ? lastTap.n + 1 : 0;
  lastTap.x = x; lastTap.y = y; lastTap.t = t;
  if (lastTap.n % 2 === 1) {
    inkDrop(x, y, null, strokeInk.dropR * CFG.BRUSH * (0.95 + Math.random() * 0.25), 0, 0.5);
  } else {
    inkDrop(x, y, strokeInk, strokeInk.dropR * CFG.BRUSH,
      strokeInk.dropD * CFG.INK_AMT, strokeInk.soft);
  }
}

function endPointer(e) {
  if (tool === 'liner') { linerUp(e); return; }
  if (tool === 'swirl') { pointers.delete(e.pointerId); return; }  // no tap/drop for swirl
  const p = pointers.get(e.pointerId);
  if (!p) return;
  if (p.dist < 0.01) {
    const b2 = CFG.BRUSH * CFG.BRUSH;
    if (strokeInk.kind === 'eraser') {
      // a tap with the eraser: lift a soft spot
      eraseDab(p.x, p.y, strokeInk.strokeR * 2.4 * b2, strokeInk.strokeD);
    } else if (mode === 'painterly') {
      // a touch on paper: a small soft blot that settles into the tooth
      paperDeposit(p.x, p.y, strokeInk, strokeInk.strokeR * 2.4 * b2,
        strokeInk.strokeD * 1.35 * CFG.INK_AMT);
    } else {
      // a tap on water: a drop that displaces what was there (marbling rings)
      dropAlternate(p.x, p.y);
    }
  } else if (mode === 'painterly' && strokeInk.kind !== 'eraser') {
    // lifting the brush: wet pigment keeps wicking FORWARD along the stroke,
    // then dries and settles — not an abrupt hard stop
    wetTongue(p.x, p.y, p.dirx, p.diry, Math.max(p.lastR, 0.0008) * 2.2);
  }
  pointers.delete(e.pointerId);
}
canvas.addEventListener('pointerup', endPointer);
canvas.addEventListener('pointercancel', endPointer);

/* ---------------- wash away (洗い流す) ---------------- */
let washT = 0;
function startWash() {
  washT = 2.4;
  radialPush(0.5, 0.5, 0.05, 50);  // a gentle pour of fresh water
}
function washTick(dt) {
  if (washT <= 0) return;
  washT -= dt;
  scalePass(dye, Math.exp(-2.4 * dt));
  scalePass(whiteFld, Math.exp(-2.4 * dt));
  scalePass(wet, Math.exp(-2.4 * dt));
  scalePass(velocity, Math.exp(-1.2 * dt));
  if (washT <= 0) {
    scalePass(dye, 0);
    scalePass(whiteFld, 0);
    scalePass(wet, 0);
    scalePass(velocity, 0);
    scalePass(pressure, 0);
    clearInk();              // wash away the pen layer too
  }
}

/* ---------------- UI ---------------- */
let selected = 'black';
const swEls = [...document.querySelectorAll('.sw')];
function selectSwatch(el) {
  selected = el.dataset.ink;
  swEls.forEach(s => s.classList.toggle('sel', s === el));
}

/* per-colour picker: coloured slots are re-assignable. Click selects; the
   edit icon (hover, desktop) or a long-press (touch) opens a colour picker
   that rebuilds that slot's pigment. Black and white are fixed tools. */
const inkPicker = document.getElementById('inkPicker');
let editTarget = null;
/* Lay the hidden colour input EXACTLY over the element that opened it (same
   box, not a 1px point) so the OS popup anchors to the swatch every time —
   this is the fix for the picker sometimes appearing in the top-left corner. */
function floatPicker(input, el) {
  const r = el.getBoundingClientRect();
  input.style.left   = Math.round(r.left)   + 'px';
  input.style.top    = Math.round(r.top)    + 'px';
  input.style.width  = Math.round(r.width)  + 'px';
  input.style.height = Math.round(r.height) + 'px';
  // Force a synchronous reflow so the native popup anchors to the NEW position.
  // Without this the browser may still see the old box (0,0) and drop the
  // picker in the top-left corner — the source of the intermittent jump.
  void input.offsetWidth;
}
function openPicker(el) {
  editTarget = el;
  const ink = INKS[el.dataset.ink];
  inkPicker.value = ink && ink.hex ? ink.hex : '#888888';
  floatPicker(inkPicker, el);
  inkPicker.click();
}
inkPicker.addEventListener('input', () => {
  if (!editTarget) return;
  const slot = editTarget.dataset.ink, hex = inkPicker.value;
  INKS[slot] = makeColorInk(hex);            // rebuild absorption from the new hue
  editTarget.style.setProperty('--c', hex);
});

swEls.forEach(el => {
  const recolor = el.classList.contains('recolor');
  let lpTimer = 0, lpFired = false;
  el.addEventListener('click', () => {
    if (lpFired) { lpFired = false; return; } // the long-press already acted
    // tapping the already-active colour swatch opens its recolour picker
    if (recolor && el.classList.contains('sel')) { openPicker(el); return; }
    selectSwatch(el);
  });
  if (!recolor) return;
  const icon = el.querySelector('.edit');
  if (icon) icon.addEventListener('click', e => { e.stopPropagation(); selectSwatch(el); openPicker(el); });
  el.addEventListener('pointerdown', () => {
    lpFired = false;
    clearTimeout(lpTimer);
    lpTimer = setTimeout(() => { lpFired = true; selectSwatch(el); openPicker(el); }, 500);
  });
  const cancel = () => clearTimeout(lpTimer);
  el.addEventListener('pointerup', cancel);
  el.addEventListener('pointermove', cancel);
  el.addEventListener('pointerleave', cancel);
  el.addEventListener('pointercancel', cancel);
});

document.getElementById('washBtn').addEventListener('click', startWash);

/* ---------- background / paper colour (地) ----------
   The chosen colour feeds the display shader's uPaper. Light grounds keep the
   classic subtractive look; dark grounds reveal each pigment's body colour
   (see the EMISSIVE REVEAL note in FRAG_DISPLAY). */
let bgHex = '#f6f2e9';
function setBg(hex) {
  bgHex = hex;
  const c = hexToRGB(hex);
  matDisplay.uniforms.uPaper.value.set(c[0], c[1], c[2]);
  document.documentElement.style.setProperty('--paper', hex);   // page bg during the load fade
  const lum = 0.299 * c[0] + 0.587 * c[1] + 0.114 * c[2];
  document.body.classList.toggle('darkground', lum < 0.4);      // flip floating labels to light
}
const bgEls = [...document.querySelectorAll('.bg')];
const bgPicker = document.getElementById('bgPicker');
const bgCustom = document.getElementById('bgCustom');
bgEls.forEach(el => el.addEventListener('click', () => {
  if (el === bgCustom) { floatPicker(bgPicker, bgCustom); bgPicker.value = bgHex; bgPicker.click(); return; }
  setBg(el.dataset.bg);
  bgEls.forEach(b => b.classList.toggle('sel', b === el));
}));
bgPicker.addEventListener('input', () => {
  setBg(bgPicker.value);
  bgCustom.style.setProperty('--b', bgPicker.value);
  bgEls.forEach(b => b.classList.toggle('sel', b === bgCustom));
});
setBg(bgHex);

/* ---------- save the artwork as a PNG (保存) ----------
   Composite the fluid/paper canvas with the 細筆 pen overlay onto an offscreen
   2D canvas and download it. Only the canvases are captured, so no UI is in the
   image. We render a fresh frame and read it synchronously in the same tick —
   the WebGL drawing buffer is still intact at that point. */
function saveImage() {
  render();                                   // fresh draw to the visible buffer
  const out = document.createElement('canvas');
  out.width = W; out.height = H;
  const octx = out.getContext('2d');
  octx.drawImage(canvas, 0, 0);               // paper + ink-on-water / wash
  octx.drawImage(inkCanvas, 0, 0);            // 細筆 fineliner overlay on top
  out.toBlob(blob => {
    if (!blob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const ts = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
    a.download = `suminagashi-${ts}.png`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }, 'image/png');
}
document.getElementById('saveBtn').addEventListener('click', saveImage);

/* ---------- import an image as ink (写真を墨に) ----------
   Seeds the dye/density field with the photo's pixels (contain-fit, centred),
   converted to absorption, so painting / swirling then drags and dissolves it. */
const imgPicker = document.getElementById('imgPicker');
document.getElementById('importBtn').addEventListener('click', () => imgPicker.click());
imgPicker.addEventListener('change', () => {
  const file = imgPicker.files && imgPicker.files[0];
  if (file) importImage(file);
  imgPicker.value = '';   // allow re-importing the same file
});
function importImage(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    // imported ink lives on the water surface — make sure we're in ink mode
    if (mode !== 'suminagashi') setMode('suminagashi');
    tool = 'brush';
    toolEls.forEach(x => x.classList.toggle('sel', x.dataset.mode === 'suminagashi'));

    if (matImage.uniforms.uImage.value) matImage.uniforms.uImage.value.dispose();
    const tex = new THREE.Texture(img);
    tex.colorSpace = THREE.LinearSRGBColorSpace;   // sample raw display-space values
    tex.minFilter = THREE.LinearFilter; tex.magFilter = THREE.LinearFilter;
    tex.generateMipmaps = false; tex.flipY = false; tex.needsUpdate = true;

    const u = matImage.uniforms;
    u.uImage.value = tex;
    u.uCanvasAspect.value = W / H;
    u.uImageAspect.value = img.width / Math.max(1, img.height);
    // seed the pigment against a LIGHT reference (the image's colours are
    // defined on white); the display then composites it onto any background.
    u.uPaper.value.set(0.964, 0.951, 0.915);
    blit(dye.write, matImage); dye.swap();          // seed the dye field
    scalePass(velocity, 0); scalePass(wet, 0); scalePass(whiteFld, 0);   // sit still, dry, no white
    URL.revokeObjectURL(url);
  };
  img.onerror = () => URL.revokeObjectURL(url);
  img.src = url;
}

/* ---------- tuning panel ---------- */
const gearBtn = document.getElementById('gearBtn');
const panel = document.getElementById('panel');
gearBtn.addEventListener('click', () => {
  panel.classList.toggle('open');
  gearBtn.classList.toggle('open', panel.classList.contains('open'));
});
document.addEventListener('pointerdown', e => {
  if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== gearBtn && !gearBtn.contains(e.target)) {
    panel.classList.remove('open');
    gearBtn.classList.remove('open');
  }
});
const $ = id => document.getElementById(id);
const SLIDER_MAP = {
  sStiff: s => { CFG.VEL_DISS   = 0.4 + s * 2.8; },
  sLife:  s => { CFG.DYE_DISS   = 0.3 * Math.exp(-4.1 * s) * (1 - s); },  // s=1 → truly permanent
  sBrush: s => { CFG.BRUSH      = 0.3 + 2.2 * s; },
  sInk:   s => { CFG.INK_AMT    = 0.3 + 2.2 * s; },
  sDiff:  s => { CFG.MC_CORRECT = 0.5 * (1 - s); },
  sWet:   s => { CFG.WETNESS    = s; },
  sGran:  s => { CFG.GRAN       = s; },
  sSmooth:s => { CFG.SMOOTH     = s; },
};
for (const id of Object.keys(SLIDER_MAP)) {
  $(id).addEventListener('input', e => {
    modeFade = null;                       // hand-tuning takes over from the preset
    SLIDER_MAP[id](parseFloat(e.target.value));
  });
}

/* ---------- mode presets ----------
   The two modes are different SURFACES, not just different parameters.
   墨流し: ink on water — the fluid solver, coherent bands, permanent.
   水墨: water-colour on paper — pigment stays put and bleeds a short way,
   permanent. The slider values still set the shared brush/ink feel.        */
const MODES = {
  suminagashi: { sStiff:0.71, sLife:1.00, sBrush:0.23, sInk:0.32, sDiff:0.00, sWet:0.85, sGran:0.55, sSmooth:0.5 },
  painterly:   { sStiff:0.50, sLife:1.00, sBrush:0.40, sInk:0.50, sDiff:0.00, sWet:0.85, sGran:0.55, sSmooth:0.5 },
};
let modeFade = null;
const modeEls = [...document.querySelectorAll('.mode[data-mode]')];   // the two wash surfaces
const toolEls = [...document.querySelectorAll('.mode')];              // + 渦 swirl, 細筆 fineliner
function setMode(name, instant) {
  if (name === 'painterly' && mode !== 'painterly') dryPaper(); // start on a dry sheet
  mode = name;
  modeEls.forEach(b => b.classList.toggle('sel', b.dataset.mode === name));
  const to = MODES[name];
  if (instant) {
    for (const k of Object.keys(to)) { SLIDER_MAP[k](to[k]); $(k).value = to[k]; }
    return;
  }
  const from = {};
  for (const k of Object.keys(to)) from[k] = parseFloat($(k).value);
  modeFade = { from, to, t0: nowS(), dur: 1.4 };
}
toolEls.forEach(b => b.addEventListener('click', () => {
  liner.drawing = false; liner.id = -1;               // cancel any in-progress line
  const t = b.dataset.tool;
  if (t === 'liner') tool = 'liner';                  // pen overlay; sim keeps running underneath
  else if (t === 'swirl') { tool = 'swirl'; if (mode !== 'suminagashi') setMode('suminagashi'); }
  else { tool = 'brush'; setMode(b.dataset.mode); }
  toolEls.forEach(x => x.classList.toggle('sel', x === b));   // highlight AFTER any setMode
}));
setMode('suminagashi', true);

function modeFadeTick(now) {
  if (!modeFade) return;
  const e = Math.min(1, (now - modeFade.t0) / modeFade.dur);
  const s = e * e * (3 - 2 * e);
  for (const k of Object.keys(modeFade.to)) {
    const v = modeFade.from[k] + (modeFade.to[k] - modeFade.from[k]) * s;
    SLIDER_MAP[k](v);
    $(k).value = v;
  }
  if (e >= 1) modeFade = null;
}

/* ---------- write words as ink (言葉) ----------
   Rasterise the phrase offscreen, sample the glyph coverage into points,
   then feed them to the fluid left-to-right over a couple of seconds —
   an invisible brush tracing the letters, which then bloom and drift. */
const textJob = { pts:[], done:0, started:0, dur:1, ink:INKS.black, r:0.0001, amt:0.3 };

async function paintText(str) {
  str = str.trim();
  if (!str) return;
  try { await document.fonts.load("400 160px 'Zen Old Mincho'"); } catch (e) {}
  const ink = pickInk();
  const sizeS   = parseFloat($('sTSize').value);
  const weightS = parseFloat($('sTWeight').value);

  const fs = 160;
  const oc = document.createElement('canvas');
  const ctx = oc.getContext('2d', { willReadFrequently: true });
  ctx.font = `400 ${fs}px 'Zen Old Mincho', serif`;
  const tw = Math.max(1, ctx.measureText(str).width);
  oc.width  = Math.ceil(tw + fs * 0.4);
  oc.height = Math.ceil(fs * 1.6);
  ctx.font = `400 ${fs}px 'Zen Old Mincho', serif`;   // canvas resize resets state
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#000';
  ctx.fillText(str, fs * 0.2, oc.height * 0.52);
  const data = ctx.getImageData(0, 0, oc.width, oc.height).data;

  // glyph height as a fraction of the view, shrunk if the line would overflow
  let scaleY = (0.10 + sizeS * 0.25) / fs;
  const wUv = () => oc.width * scaleY * H / W;
  if (wUv() > 0.82) scaleY *= 0.82 / wUv();

  const cx = 0.5, cy = 0.54;
  const rot = (Math.random() - 0.5) * 0.07;           // slight hand-held tilt
  const cosR = Math.cos(rot), sinR = Math.sin(rot);
  const step = Math.max(2, Math.round(fs / 44));
  const pts = [];
  for (let py = 0; py < oc.height; py += step) {
    for (let px = 0; px < oc.width; px += step) {
      const a = data[(py * oc.width + px) * 4 + 3] / 255;
      if (a < 0.15) continue;
      // offsets from the text centre, in aspect-corrected space, then rotated
      let ax = (px - oc.width * 0.5) * scaleY;
      let ay = (oc.height * 0.52 - py) * scaleY;
      const rx = ax * cosR - ay * sinR;
      const ry = ax * sinR + ay * cosR;
      pts.push({
        x: cx + rx * H / W + (Math.random() - 0.5) * 0.0014,
        y: cy + ry        + (Math.random() - 0.5) * 0.0014,
        a,
        k: px + py * 0.18 + Math.random() * 10,       // writing order: left to right
      });
    }
  }
  if (!pts.length) return;
  pts.sort((m, n) => m.k - n.k);

  textJob.pts = pts;
  textJob.done = 0;
  textJob.started = nowS() + 0.2;
  textJob.dur = Math.min(2.6, Math.max(0.8, pts.length / 900));
  textJob.ink = ink;
  textJob.r = 0.00005 + 0.00048 * weightS * weightS;
  textJob.amt = ink.strokeD * 0.55;
}

function textTick(now) {
  if (textJob.done >= textJob.pts.length) return;
  const progress = (now - textJob.started) / textJob.dur;
  const target = Math.min(textJob.pts.length, Math.max(0, Math.ceil(progress * textJob.pts.length)));
  while (textJob.done < target) {
    const p = textJob.pts[textJob.done++];
    dyeSplat(p.x, p.y, textJob.ink, textJob.r, textJob.amt * p.a);
    if (Math.random() < 0.1) {
      velSplat(p.x, p.y, (Math.random() - 0.5) * 26, (Math.random() - 0.5) * 26, 0.0007);
    }
  }
}

const textInput = $('textInput');
textInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    paintText(textInput.value);
    textInput.blur();
  }
});

/* ---------------- resize ---------------- */
let resizeTimer = 0;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { viewSize(); initFBOs(true); sizeInk(true); }, 220);
});

/* ---------------- main loop ---------------- */
viewSize();
initFBOs(false);
sizeInk(false);

let last = nowS();
function frame() {
  requestAnimationFrame(frame);
  const t = nowS();
  const dt = Math.min(t - last, 1 / 30);
  last = t;
  if (dt <= 0) return;
  modeFadeTick(t);
  textTick(t);
  washTick(dt);
  if (mode === 'painterly') stepPaper(dt);
  else step(dt);
  render();
}
frame();
</script>
